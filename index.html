<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THR Yudi v29.0 - Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d0d; --gold: #d4af37; --dark: #051a06; --glass: rgba(255, 255, 255, 0.98); }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #113311 0%, #051a06 100%); z-index: -1; }
        .container { max-width: 450px; margin: auto; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; }
        
        .card { background: var(--glass); border-radius: 20px; padding: 20px; color: #111; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid var(--gold); margin-bottom: 15px; }
        h1 { color: var(--gold); font-weight: 800; text-align: center; margin: 0 0 10px 0; font-size: 1.6em; }

        .btn { border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; width: 100%; font-family: inherit; margin-top: 8px; text-transform: uppercase; }
        .btn-primary { background: var(--primary); color: var(--gold); }
        .btn-gold { background: var(--gold); color: white; }
        .btn-danger { background: #d32f2f; color: white; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; text-align: center; font-size: 1em; }

        /* QR Center */
        .qr-area { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 15px 0; }
        #qr-code { background: white; padding: 10px; border-radius: 10px; border: 4px solid var(--gold); }

        /* Game Box */
        #game-box { position: relative; width: 100%; height: 400px; background: rgba(0,0,0,0.2); border-radius: 15px; overflow: hidden; border: 1px dashed var(--gold); }
        
        /* Falling Angpao */
        .angpao {
            position: absolute; width: 50px; height: 70px; background: #e63946; 
            border: 2px solid var(--gold); border-radius: 8px; display: flex;
            align-items: center; justify-content: center; font-size: 1.5em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 10;
            animation: fall linear infinite;
        }
        .angpao::after { content: '🧧'; }
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); }
            100% { transform: translateY(500px) rotate(360deg); }
        }

        /* Grid Game */
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .cell { background: #fff; height: 60px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #333; border: 1px solid #ddd; box-shadow: 0 4px 0 #ccc; }
        .cell.my-pick { background: var(--gold) !important; color: white; border-color: #b8860b; }
        .cell.taken { background: #eee; color: #aaa; opacity: 0.5; }

        /* Host Recap Table */
        .recap-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; border-radius: 10px; overflow: hidden; font-size: 0.85em; }
        .recap-table th { background: #eee; padding: 10px; text-align: left; }
        .recap-table td { padding: 10px; border-bottom: 1px solid #f0f0f0; color: #333; }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    
    <div id="screen-start" class="card">
        <h1>THR DIGITAL</h1>
        <button class="btn btn-primary" onclick="goTo('screen-host-setup')">HOST PANEL (YUDI)</button>
        <button class="btn btn-gold" onclick="goTo('screen-part-join')">JOIN PESERTA</button>
    </div>

    <div id="screen-host-setup" class="card" style="display:none;">
        <h3>Konfigurasi</h3>
        <input type="password" id="h-pass" placeholder="Admin Password">
        <input type="number" id="h-budget" value="1000000" placeholder="Total Budget">
        <button class="btn btn-primary" onclick="initHost()">BUAT ROOM</button>
        <button class="btn" onclick="goTo('screen-start')">KEMBALI</button>
    </div>

    <div id="screen-host-lobby" class="card" style="display:none;">
        <div class="qr-area">
            <div id="qr-code"></div>
            <h2 style="margin:10px 0 0 0;">KODE: <span id="room-id">----</span></h2>
        </div>
        <select id="g-type">
            <option value="angka">🔢 Tebak Angka</option>
            <option value="pancing">🧧 Rebutan Angpao Terbang</option>
            <option value="slot">🎰 Slot Keberuntungan</option>
        </select>
        <div id="player-count" style="text-align:center; margin:10px 0; font-size:0.9em;">0 Peserta Terhubung</div>
        <button class="btn btn-primary" onclick="startGame()">MULAI GAME 🏁</button>
    </div>

    <div id="screen-part-join" class="card" style="display:none;">
        <h3>Masuk Room</h3>
        <input type="text" id="p-name" placeholder="Nama Lengkap">
        <input type="text" id="p-id" placeholder="Kode 4 Digit">
        <button class="btn btn-primary" onclick="initPart()">GABUNG</button>
        <div id="reader" style="width:100%; margin-top:10px;"></div>
        <button class="btn btn-gold" onclick="startScan()">SCAN BARCODE</button>
        <button class="btn" onclick="goTo('screen-start')">KEMBALI</button>
    </div>

    <div id="screen-game" style="display:none;">
        <div class="card" style="padding:10px; display:flex; justify-content:space-between; align-items:center;">
            <b id="game-label">GAME</b>
            <span id="user-label" style="background:#ddd; padding:2px 8px; border-radius:5px; font-size:0.8em; color:#000;"></span>
        </div>

        <div id="game-box"></div>

        <div id="host-only-panel" style="display:none; margin-top:15px;">
            <div class="card" style="background:white;">
                <button class="btn btn-gold" onclick="revealAll()">🎁 BUKA HASIL SEMUA</button>
                <button class="btn btn-danger" onclick="resetGame()">GANTI GAME / LOBBY</button>
                <h4 style="margin:15px 0 5px 0; color:#000;">Rekap Pemenang:</h4>
                <table class="recap-table">
                    <thead><tr><th>Nama</th><th>Hasil</th></tr></thead>
                    <tbody id="recap-body"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKuKWKtrcCnZdBPDo3X41Xv5ydKYSaSEs",
        authDomain: "thr-yudi.firebaseapp.com",
        databaseURL: "https://thr-yudi-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "thr-yudi",
        storageBucket: "thr-yudi.firebasestorage.app",
        messagingSenderId: "118870501569",
        appId: "1:118870501569:web:b951a0eb7bde9ce026cc40"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let room = null, myName = "", myRoomId = "", isHost = false, hasPicked = false, spoken = false;

    function goTo(id) {
        document.querySelectorAll('.card, #screen-game').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function initHost() {
        if(document.getElementById('h-pass').value !== "yudi123") return alert("Password Salah!");
        isHost = true;
        myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
        db.ref('active_sessions/' + myRoomId).set({
            status: 'lobby',
            budget: parseInt(document.getElementById('h-budget').value) || 1000000,
            showResults: false
        });
        document.getElementById('room-id').innerText = myRoomId;
        document.getElementById('qr-code').innerHTML = "";
        new QRCode(document.getElementById('qr-code'), { text: myRoomId, width: 150, height: 150 });
        goTo('screen-host-lobby');
        sync();
    }

    function initPart() {
        myName = document.getElementById('p-name').value.trim();
        myRoomId = document.getElementById('p-id').value.trim();
        if(!myName || !myRoomId) return alert("Isi nama & kode!");
        db.ref(`active_sessions/${myRoomId}/players/${myName}`).set(true);
        document.getElementById('user-label').innerText = myName;
        goTo('screen-game'); // Wait screen
        sync();
    }

    function sync() {
        db.ref('active_sessions/' + myRoomId).on('value', snap => {
            room = snap.val();
            if(!room) return;
            const players = Object.keys(room.players || {});
            if(isHost) document.getElementById('player-count').innerText = players.length + " Peserta Terhubung";

            if(room.status === 'playing') {
                goTo('screen-game');
                render();
            } else if(room.status === 'lobby' && isHost) {
                goTo('screen-host-lobby');
            }
        });
    }

    function startGame() {
        const type = document.getElementById('g-type').value;
        db.ref('active_sessions/' + myRoomId).once('value', snap => {
            const ps = Object.keys(snap.val().players || {});
            if(ps.length === 0) return alert("Belum ada pemain!");
            
            let budget = snap.val().budget;
            let list = [];
            let currentTotal = 0;
            for(let i=0; i<ps.length; i++) {
                if(i === ps.length - 1) {
                    list.push(budget - currentTotal);
                } else {
                    let share = Math.round((budget / ps.length) * (0.7 + Math.random() * 0.6) / 1000) * 1000;
                    list.push(share);
                    currentTotal += share;
                }
            }
            list.sort(() => Math.random() - 0.5);
            db.ref('active_sessions/' + myRoomId).update({ status: 'playing', gameType: type, budgetList: list, showResults: (type === 'slot') });
        });
    }

    function render() {
        const box = document.getElementById('game-box');
        box.innerHTML = "";
        document.getElementById('game-label').innerText = room.gameType.toUpperCase();

        if(isHost) {
            document.getElementById('host-only-panel').style.display = 'block';
            box.innerHTML = "<p style='color:white; text-align:center; padding-top:150px;'>Monitoring Mode...<br>Cek tabel di bawah</p>";
            updateRecap();
        } else {
            document.getElementById('host-only-panel').style.display = 'none';
            if(room.gameType === 'pancing') renderPancing();
            else if(room.gameType === 'angka') renderAngka();
            else renderSlot();
        }
    }

    function renderPancing() {
        const box = document.getElementById('game-box');
        let myData = null;
        if(room.selections) Object.values(room.selections).forEach(s => { if(s.name === myName) myData = s; });

        if(myData) {
            box.innerHTML = `<div style="text-align:center; padding-top:100px;"><h2>🧧 TERTANGKAP!</h2>
            ${room.showResults ? `<h1>Rp${myData.val.toLocaleString()}</h1>` : '<p>Tunggu Yudi buka hasilnya...</p>'}</div>`;
            if(room.showResults) handleVoice(myData.val);
            return;
        }

        room.budgetList.forEach((val, i) => {
            if(!room.selections || !room.selections[i]) {
                const el = document.createElement('div');
                el.className = "angpao";
                el.style.left = Math.random() * 80 + "%";
                el.style.animationDuration = (2 + Math.random() * 2) + "s";
                el.style.animationDelay = Math.random() * 2 + "s";
                el.onclick = () => pick(i, val);
                box.appendChild(el);
            }
        });
    }

    function renderAngka() {
        const box = document.getElementById('game-box');
        box.innerHTML = "<div class='grid-layout'></div>";
        const grid = box.querySelector('.grid-layout');
        room.budgetList.forEach((val, i) => {
            const sel = room.selections ? room.selections[i] : null;
            const el = document.createElement('div');
            el.className = `cell ${sel ? (sel.name === myName ? 'my-pick' : 'taken') : ''}`;
            if(room.showResults && sel && sel.name === myName) {
                el.innerText = `Rp${val.toLocaleString()}`; handleVoice(val);
            } else {
                el.innerText = sel ? (sel.name === myName ? "SAYA" : "X") : i+1;
            }
            el.onclick = () => { if(!hasPicked && !sel) pick(i, val); };
            grid.appendChild(el);
        });
    }

    function renderSlot() {
        const box = document.getElementById('game-box');
        let myWin = null;
        if(room.selections) Object.values(room.selections).forEach(s => { if(s.name === myName) myWin = s.val; });
        if(myWin) {
            box.innerHTML = `<div style="text-align:center; padding-top:100px;"><h1>🎰 Rp${myWin.toLocaleString()}</h1></div>`;
            handleVoice(myWin);
        } else {
            box.innerHTML = `<div style="padding:20px;"><button class="btn btn-gold" onclick="spin()">PUTAR SLOT 🎰</button></div>`;
        }
    }

    function pick(i, v) {
        db.ref(`active_sessions/${myRoomId}/selections/${i}`).transaction(c => {
            if(c === null) return { name: myName, val: v };
            return;
        }, (err, ok) => { if(ok) { hasPicked = true; confetti(); } });
    }

    function spin() {
        db.ref(`active_sessions/${myRoomId}`).once('value', snap => {
            const d = snap.val();
            let tk = d.selections ? Object.keys(d.selections).map(Number) : [];
            let av = d.budgetList.map((_, i) => i).filter(idx => !tk.includes(idx));
            if(av.length > 0) pick(av[0], d.budgetList[av[0]]);
        });
    }

    function updateRecap() {
        const body = document.getElementById('recap-body');
        body.innerHTML = "";
        Object.keys(room.players || {}).forEach(p => {
            let res = "---";
            if(room.selections) {
                Object.values(room.selections).forEach(s => {
                    if(s.name === p) res = room.showResults ? `<b>Rp${s.val.toLocaleString()}</b>` : '✅ OK';
                });
            }
            body.innerHTML += `<tr><td>${p}</td><td>${res}</td></tr>`;
        });
    }

    function startScan() {
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render((t) => { document.getElementById('p-id').value = t; scanner.clear(); });
    }

    function handleVoice(amt) {
        if(spoken) return;
        spoken = true;
        const msg = new SpeechSynthesisUtterance(`Selamat ${myName}, dapet ${amt} rupiah!`);
        msg.lang = 'id-ID'; window.speechSynthesis.speak(msg);
    }

    function revealAll() { db.ref(`active_sessions/${myRoomId}/showResults`).set(true); confetti(); }
    function resetGame() { hasPicked = false; spoken = false; db.ref(`active_sessions/${myRoomId}`).update({ status: 'lobby', selections: null, showResults: false }); }
</script>
</body>
</html>
