<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi THR Keluarga Yudi v10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b5e20; --gold: #ffd700; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1b5e20 0%, #002200 100%); color: var(--white); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); z-index: -1; animation: moveStars 50s linear infinite; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
        .container { max-width: 500px; margin: auto; padding: 20px; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 20px; color: #333; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-top: 20px; animation: zoomIn 0.5s ease; border: 1px solid var(--gold); }
        .menu-item { background: linear-gradient(135deg, var(--primary), #003300); color: var(--gold); padding: 18px; border-radius: 15px; cursor: pointer; margin-bottom: 15px; border: 2px solid var(--gold); font-weight: 600; transition: 0.3s; }
        
        /* Game 1: Angka */
        .grid-angka { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { background: #eee; height: 70px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; cursor: pointer; border-bottom: 5px solid #ccc; }
        .num-btn.revealed { background: var(--white); border: 2px solid var(--primary); font-size: 0.8em; color: var(--primary); transform: rotateY(360deg); transition: 0.8s; }

        /* Game 2: Bar */
        .slot-container { background: #111; padding: 20px; border-radius: 15px; border: 4px solid var(--gold); margin: 15px 0; height: 90px; display: flex; align-items: center; justify-content: center; }
        #slot-val { color: var(--gold); font-size: 1.8em; font-weight: 800; }

        /* Game 3: Pancing Amplop (Fishing) */
        .fishing-area { position: relative; width: 100%; height: 300px; background: #e3f2fd; border-radius: 15px; overflow: hidden; border: 2px dashed var(--primary); margin: 15px 0; }
        .envelope { position: absolute; font-size: 2.5em; cursor: pointer; transition: all 0.5s linear; user-select: none; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1em; box-shadow: 0 5px #003300; }
        .back-btn { background: #757575; color: white; border: none; padding: 6px 15px; border-radius: 8px; float: left; cursor: pointer; margin-bottom: 10px; }
        .recap-container { margin-top: 20px; max-height: 200px; overflow-y: auto; background: #fff; border-radius: 15px; padding: 10px; border: 1px solid #ddd; font-size: 0.85em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #f0f0f0; padding: 10px; text-align: center; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    <h1 style="color:var(--gold); margin-top:30px; text-shadow: 2px 2px #000;">🌙 EID MUBARAK 🌙</h1>

    <div id="dashboard" class="card">
        <h2 style="color: var(--primary);">Pilih Game THR</h2>
        <div class="menu-item" onclick="openSetup('angka')">🔢 Tebak Angka</div>
        <div class="menu-item" onclick="openSetup('bar')">🎰 Slot Bar (Shuffle)</div>
        <div class="menu-item" onclick="openSetup('pancing')">🎣 Pancing Amplop</div>
        <p style="font-size: 0.7em; color: #888;">Audio & Animasi Aktif ✅</p>
    </div>

    <div id="setup" class="card" style="display:none;">
        <button class="back-btn" onclick="showDashboard()">← Menu</button><br>
        <h2 style="color: var(--primary);">Pengaturan</h2>
        <input type="number" id="inp-peserta" placeholder="Jumlah Peserta" value="5">
        <input type="number" id="inp-budget" placeholder="Total Budget (Rp)" value="1000000">
        <button class="btn-main" onclick="initGame()">MULAI GAME 🚀</button>
    </div>

    <div id="game-angka" class="card" style="display:none;">
        <h3>Pilih Angka!</h3>
        <div class="grid-angka" id="angka-area"></div>
        <div class="recap-container"><table><thead><tr><th>No</th><th>Hasil</th></tr></thead><tbody id="recap-angka-body"></tbody></table></div>
        <button class="btn-main" onclick="showDashboard()" style="background:#757575;">Tutup</button>
    </div>

    <div id="game-bar" class="card" style="display:none;">
        <h3 id="info-bar">Giliran Peserta ke-1</h3>
        <div class="slot-container"><div id="slot-val">READY?</div></div>
        <button class="btn-main" id="btn-slot" onclick="handleSlot()">ACAK 🎰</button>
        <div class="recap-container"><table><thead><tr><th>Penerima</th><th>Hasil</th></tr></thead><tbody id="recap-bar-body"></tbody></table></div>
        <button class="btn-main" onclick="showDashboard()" style="background:#757575; margin-top:10px;">Tutup</button>
    </div>

    <div id="game-pancing" class="card" style="display:none;">
        <h3 id="info-pancing">Klik amplop untuk menangkap!</h3>
        <div class="fishing-area" id="fishing-area"></div>
        <div class="recap-container"><table><thead><tr><th>Penerima</th><th>Hasil</th></tr></thead><tbody id="recap-pancing-body"></tbody></table></div>
        <button class="btn-main" onclick="showDashboard()" style="background:#757575; margin-top:10px;">Tutup</button>
    </div>
</div>

<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    let mode = '';
    let budgetList = [];
    let fullOriginalList = [];
    let currentParticipant = 1;
    let isRunning = false;
    let slotInterval;
    let fishingInterval;

    function format(v) { return "Rp" + new Intl.NumberFormat('id-ID').format(v); }
    function showDashboard() { location.reload(); }
    
    function openSetup(m) {
        mode = m;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('setup').style.display = 'block';
    }

    function bicara(teks) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(teks);
            msg.lang = 'id-ID';
            msg.rate = 0.85;
            window.speechSynthesis.speak(msg);
        }
    }

    function initGame() {
        let jml = parseInt(document.getElementById('inp-peserta').value);
        let budget = parseInt(document.getElementById('inp-budget').value);
        if(!jml || !budget) return alert("Isi data!");

        let jackpot = Math.round((budget * 0.3) / 1000) * 1000;
        let sisa = budget - jackpot;
        let base = Math.floor(sisa / (jml - 1));
        
        budgetList = [jackpot];
        for(let i=0; i < jml - 1; i++){
            let val = Math.round((base * (0.7 + Math.random() * 0.6)) / 1000) * 1000;
            if(val > sisa) val = base;
            budgetList.push(val);
            sisa -= val;
        }
        budgetList[1] += sisa;
        budgetList.sort(() => Math.random() - 0.5);
        fullOriginalList = [...budgetList];

        document.getElementById('setup').style.display = 'none';
        if(mode === 'angka') setupAngka(); 
        else if(mode === 'bar') setupBar();
        else setupPancing();
    }

    // --- LOGIC GAME 1: ANGKA ---
    function setupAngka() {
        document.getElementById('game-angka').style.display = 'block';
        const area = document.getElementById('angka-area');
        budgetList.forEach((val, i) => {
            area.innerHTML += `<div class="num-btn" id="nb-${i}" onclick="revealAngka(${i}, ${val})">${i+1}</div>`;
        });
    }
    function revealAngka(i, val) {
        const el = document.getElementById('nb-' + i);
        if(el.classList.contains('revealed')) return;
        el.classList.add('revealed'); el.innerText = format(val);
        bicara(`Selamat. Anda mendapatkan ${val} rupiah.`);
        if(val === Math.max(...fullOriginalList)) { confetti(); document.getElementById('snd-win').play(); }
        document.getElementById('recap-angka-body').innerHTML += `<tr><td>${i+1}</td><td>${format(val)}</td></tr>`;
    }

    // --- LOGIC GAME 2: BAR ---
    function setupBar() { document.getElementById('game-bar').style.display = 'block'; }
    function handleSlot() {
        const btn = document.getElementById('btn-slot');
        const display = document.getElementById('slot-val');
        if (!isRunning) {
            isRunning = true; btn.innerText = "STOP!";
            slotInterval = setInterval(() => {
                display.innerText = format(fullOriginalList[Math.floor(Math.random() * fullOriginalList.length)]);
            }, 60);
        } else {
            isRunning = false; clearInterval(slotInterval);
            let winIdx = Math.floor(Math.random() * budgetList.length);
            let winVal = budgetList[winIdx];
            display.innerText = format(winVal);
            bicara(`Peserta ${currentParticipant} mendapatkan ${winVal} rupiah.`);
            document.getElementById('snd-win').play(); confetti();
            document.getElementById('recap-bar-body').innerHTML += `<tr><td>Peserta ${currentParticipant}</td><td>${format(winVal)}</td></tr>`;
            budgetList.splice(winIdx, 1); currentParticipant++;
            btn.disabled = true;
            setTimeout(() => { 
                if(budgetList.length > 0) { btn.disabled = false; btn.innerText = "LANJUT"; }
                else { btn.innerText = "HABIS"; }
            }, 2000);
        }
    }

    // --- LOGIC GAME 3: PANCING ---
    function setupPancing() {
        document.getElementById('game-pancing').style.display = 'block';
        const area = document.getElementById('fishing-area');
        for(let i=0; i<budgetList.length; i++) {
            const env = document.createElement('div');
            env.className = 'envelope'; env.innerHTML = '✉️';
            env.style.left = Math.random() * 80 + '%';
            env.style.top = Math.random() * 80 + '%';
            env.onclick = () => catchEnvelope(env);
            area.appendChild(env);
        }
        fishingInterval = setInterval(() => {
            document.querySelectorAll('.envelope').forEach(en => {
                en.style.left = Math.random() * 80 + '%';
                en.style.top = Math.random() * 80 + '%';
            });
        }, 800);
    }
    function catchEnvelope(el) {
        if(budgetList.length === 0) return;
        let winIdx = Math.floor(Math.random() * budgetList.length);
        let winVal = budgetList[winIdx];
        el.innerHTML = '💰'; el.style.pointerEvents = 'none';
        bicara(`Keren! Anda memancing hadiah sebesar ${winVal} rupiah.`);
        document.getElementById('snd-win').play(); confetti();
        document.getElementById('recap-pancing-body').innerHTML += `<tr><td>Pancingan ${currentParticipant}</td><td>${format(winVal)}</td></tr>`;
        budgetList.splice(winIdx, 1); currentParticipant++;
        setTimeout(() => el.remove(), 1000);
        if(budgetList.length === 0) clearInterval(fishingInterval);
    }
</script>
</body>
</html>
