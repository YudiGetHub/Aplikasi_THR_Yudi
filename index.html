<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi THR Keluarga Yudi v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b5e20; --gold: #ffd700; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1b5e20 0%, #002200 100%); color: var(--white); margin: 0; padding: 0; min-height: 100vh; text-align: center; }
        
        /* Animasi Bintang Bergerak */
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); z-index: -1; animation: moveStars 50s linear infinite; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 20px; color: #333; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-top: 20px; animation: zoomIn 0.5s ease; }
        
        /* Dashboard */
        .menu-item { background: linear-gradient(135deg, var(--primary), #003300); color: var(--gold); padding: 20px; border-radius: 15px; cursor: pointer; margin-bottom: 15px; border: 2px solid var(--gold); font-weight: 600; transition: 0.3s; }
        .menu-item:hover { transform: scale(1.05); }

        /* Roda Berputar (Wheel) */
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; border: 5px solid var(--gold); border-radius: 50%; overflow: hidden; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #d32f2f; z-index: 10; }
        canvas { width: 100%; height: 100%; }

        /* Mystery Box */
        .grid-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .box { background: var(--gold); height: 80px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2em; cursor: pointer; border-bottom: 5px solid #b8860b; }
        .box.opened { background: #ddd; border: none; font-size: 0.7em; font-weight: bold; color: var(--primary); }

        /* Utility */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .back-btn { background: #757575; color: white; border: none; padding: 5px 15px; border-radius: 5px; float: left; cursor: pointer; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8em; }
        th, td { border: 1px solid #ddd; padding: 8px; }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    <h1 style="color:var(--gold); margin-top:40px;">🌙 EID MUBARAK 🌙</h1>

    <div id="dashboard" class="card">
        <h2>Pilih Game THR</h2>
        <div class="menu-item" onclick="openSetup('wheel')">🎡 Roda Berputar (Spin)</div>
        <div class="menu-item" onclick="openSetup('box')">🎁 Mystery Box (Keberuntungan)</div>
    </div>

    <div id="setup" class="card" style="display:none;">
        <button class="back-btn" onclick="showHome()">← Menu</button><br><br>
        <h2 id="setup-title">Setup</h2>
        <input type="number" id="inp-peserta" placeholder="Jumlah Peserta" value="6">
        <input type="number" id="inp-budget" placeholder="Total Budget (Rp)" value="500000">
        <button class="btn-action" onclick="initGame()">MULAI PERMAINAN</button>
    </div>

    <div id="game-wheel" class="card" style="display:none;">
        <div id="wheel-status">Klik "Putar" untuk menentukan hadiah!</div>
        <div class="wheel-pointer"></div>
        <div class="wheel-container" id="wheel-el">
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-action" id="btn-spin" onclick="spinWheel()">PUTAR RODA 🎡</button>
        <div id="recap-wheel"></div>
    </div>

    <div id="game-box" class="card" style="display:none;">
        <div id="box-status">Pilih kotak misteri kamu!</div><br>
        <div class="grid-box" id="box-area"></div>
        <div id="recap-box"></div>
        <button class="btn-action" onclick="showHome()" style="background:#757575">Selesai</button>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    let mode = '';
    let participants = [];
    let budgetArr = [];
    let isSpinning = false;

    function format(v) { return "Rp" + new Intl.NumberFormat('id-ID').format(v); }
    function showHome() { location.reload(); }
    function openSetup(m) {
        mode = m;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('setup').style.display = 'block';
        document.getElementById('setup-title').innerText = m === 'wheel' ? '🎡 Setup Roda Berputar' : '🎁 Setup Mystery Box';
    }

    function initGame() {
        const jml = parseInt(document.getElementById('inp-peserta').value);
        const budget = parseInt(document.getElementById('inp-budget').value);
        if(!jml || !budget) return alert("Isi data!");

        // Algoritma Pembagian THR
        let jackpotIdx = Math.floor(Math.random() * jml);
        let jackpotVal = Math.round((budget * 0.35) / 1000) * 1000;
        let sisa = budget - jackpotVal;
        let base = Math.floor(sisa / (jml-1));
        
        budgetArr = [];
        for(let i=0; i<jml; i++) {
            if(i === jackpotIdx) budgetArr[i] = jackpotVal;
            else {
                let val = Math.round((base * (0.6 + Math.random() * 0.8)) / 1000) * 1000;
                if(val > sisa) val = base;
                budgetArr[i] = val; sisa -= val;
            }
        }
        budgetArr[0] += sisa; // Koreksi sisa akhir

        document.getElementById('setup').style.display = 'none';
        if(mode === 'wheel') setupWheel(jml); else setupBox(jml);
    }

    // --- LOGIC GAME BOX ---
    function setupBox(jml) {
        document.getElementById('game-box').style.display = 'block';
        const area = document.getElementById('box-area');
        area.innerHTML = "";
        budgetArr.sort(() => Math.random() - 0.5); // Acak posisi
        budgetArr.forEach((val, i) => {
            area.innerHTML += `<div class="box" id="bx-${i}" onclick="openBox(${i}, ${val})">📦</div>`;
        });
    }

    function openBox(i, val) {
        const el = document.getElementById('bx-' + i);
        if(el.classList.contains('opened')) return;
        el.classList.add('opened');
        el.innerText = format(val);
        document.getElementById('snd-click').play();
        if(val === Math.max(...budgetArr)) {
            confetti({particleCount: 150});
            document.getElementById('snd-win').play();
        }
    }

    // --- LOGIC GAME WHEEL ---
    function setupWheel(jml) {
        document.getElementById('game-wheel').style.display = 'block';
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 250; canvas.height = 250;
        const arc = (Math.PI * 2) / jml;

        budgetArr.sort(() => Math.random() - 0.5);
        budgetArr.forEach((val, i) => {
            ctx.fillStyle = i % 2 === 0 ? "#1b5e20" : "#ffd700";
            ctx.beginPath(); ctx.moveTo(125, 125);
            ctx.arc(125, 125, 125, i * arc, (i + 1) * arc);
            ctx.fill();
            ctx.save(); ctx.translate(125, 125); ctx.rotate(i * arc + arc/2);
            ctx.fillStyle = i % 2 === 0 ? "white" : "black";
            ctx.fillText(i+1, 80, 5); ctx.restore();
        });
    }

    function spinWheel() {
        if(isSpinning) return;
        isSpinning = true;
        const wheel = document.getElementById('wheel-el');
        const randDeg = Math.floor(Math.random() * 360) + 3600; 
        wheel.style.transform = `rotate(${randDeg}deg)`;
        
        setTimeout(() => {
            isSpinning = false;
            confetti(); document.getElementById('snd-win').play();
            alert("Selamat! Hadiah sudah ditentukan sesuai jarum roda!");
        }, 4000);
    }
</script>
</body>
</html>
