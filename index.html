<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi THR Keluarga Yudi</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b5e20;
            --gold: #ffd700;
            --white: #ffffff;
            --dark: #003300;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #1b5e20 0%, #002200 100%);
            color: var(--white);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animasi Background */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: -1;
            animation: moveStars 50s linear infinite;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            font-weight: 800;
            margin-top: 30px;
            animation: fadeInDown 1s ease;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 20px;
            color: #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-top: 20px;
            animation: zoomIn 0.8s ease;
        }

        /* Dashboard Styles */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .menu-item {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: var(--gold);
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--gold);
            font-weight: 600;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* Form Styles */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Game Grids */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .item {
            background: #eee;
            height: 80px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 4px solid #ccc;
        }

        .item.revealed {
            background: var(--white) !important;
            border-bottom: none;
            transform: rotateY(360deg);
        }

        .jackpot {
            background: var(--gold) !important;
            color: #d32f2f !important;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .recap-table {
            width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.8em;
        }
        .recap-table th, td { border: 1px solid #ddd; padding: 8px; }

        .back-btn {
            background: #757575; color: white; border: none; padding: 8px 15px;
            border-radius: 8px; margin-bottom: 15px; cursor: pointer; float: left;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <h1>🌙 EID MUBARAK 🌙</h1>
        <p style="color: var(--gold); font-weight: 600;">Aplikasi Bagi THR Yudi v2.0</p>

        <div id="dashboard" class="card">
            <h2>Pilih Game Seru</h2>
            <div class="menu-grid">
                <div class="menu-item" onclick="showSetup('angka')">
                    🔢 Tebak Angka Keberuntungan
                </div>
                <div class="menu-item" onclick="showSetup('box')">
                    📦 Mystery Box Idul Fitri
                </div>
            </div>
            <p style="font-size: 0.8em; margin-top: 20px; color: #666;">Silakan pilih mode permainan untuk memulai</p>
        </div>

        <div id="setup-screen" class="card" style="display: none;">
            <button class="back-btn" onclick="showDashboard()">← Kembali</button>
            <h2 id="setup-title">Konfigurasi Game</h2>
            <input type="number" id="total-peserta" placeholder="Jumlah Peserta" value="7">
            <input type="number" id="total-budget" placeholder="Total Budget (Rp)" value="500000">
            <button class="btn-main" onclick="startGame()">Mulai Sekarang 🚀</button>
        </div>

        <div id="game-screen" class="card" style="display: none;">
            <div id="budget-info" style="font-weight: bold; color: var(--primary); margin-bottom: 10px;">
                Sisa Budget: <span id="sisa-val">0</span>
            </div>
            <div id="game-area" class="game-grid"></div>
            
            <div style="margin-top:20px; text-align: left;">
                <h4 style="margin: 5px 0;">📊 Rekap Pemenang:</h4>
                <table class="recap-table">
                    <thead><tr><th>No</th><th>Hasil</th><th>Status</th></tr></thead>
                    <tbody id="recap-body"></tbody>
                </table>
            </div>
            <button class="btn-main" onclick="showDashboard()" style="background:#757575;">Selesai & Keluar</button>
        </div>
    </div>

    <audio id="snd-open" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    let currentGameMode = '';
    let boxValues = [];
    let jackpotIndex = -1;
    let sisaBudget = 0;

    function formatIDR(val) {
        return "Rp" + new Intl.NumberFormat('id-ID').format(val);
    }

    function showDashboard() {
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
    }

    function showSetup(mode) {
        currentGameMode = mode;
        document.getElementById('setup-title').innerText = mode === 'angka' ? 'Setup Tebak Angka' : 'Setup Mystery Box';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'block';
    }

    function startGame() {
        const jml = parseInt(document.getElementById('total-peserta').value);
        const budget = parseInt(document.getElementById('total-budget').value);
        if(!jml || !budget) return alert("Isi data!");

        sisaBudget = budget;
        document.getElementById('sisa-val').innerText = formatIDR(budget);
        
        // Algoritma Smart Jackpot (25-40%)
        jackpotIndex = Math.floor(Math.random() * jml);
        let jackpotVal = Math.round((budget * (0.25 + Math.random() * 0.15)) / 1000) * 1000;
        let sisaUang = budget - jackpotVal;
        let perOrangBase = Math.floor(sisaUang / (jml - 1));

        boxValues = [];
        for(let i=0; i<jml; i++) {
            if(i === jackpotIndex) {
                boxValues[i] = jackpotVal;
            } else {
                let factor = currentGameMode === 'box' ? (0.5 + Math.random()) : (0.8 + Math.random() * 0.4);
                let val = Math.round((perOrangBase * factor) / 1000) * 1000;
                if(val > sisaUang) val = perOrangBase;
                boxValues[i] = val;
                sisaUang -= val;
            }
        }
        
        // Koreksi budget pas
        if(sisaUang !== 0) boxValues[jackpotIndex === 0 ? 1 : 0] += sisaUang;

        renderGame(jml);
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
    }

    function renderGame(jml) {
        const area = document.getElementById('game-area');
        area.innerHTML = "";
        document.getElementById('recap-body').innerHTML = "";
        
        for(let i=0; i<jml; i++) {
            const content = currentGameMode === 'angka' ? (i+1) : '📦';
            area.innerHTML += `
                <div class="item" id="item-${i}" onclick="reveal(${i})">
                    ${content}
                </div>
            `;
        }
    }

    function reveal(idx) {
        const el = document.getElementById('item-' + idx);
        if(el.classList.contains('revealed')) return;

        const val = boxValues[idx];
        el.classList.add('revealed');
        el.innerText = formatIDR(val);

        if(idx === jackpotIndex) {
            el.classList.add('jackpot');
            document.getElementById('snd-win').play().catch(()=>{});
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById('snd-open').play().catch(()=>{});
        }

        const row = document.createElement('tr');
        if(idx === jackpotIndex) row.style.background = "#fff9c4";
        row.innerHTML = `<td>${idx+1}</td><td>${formatIDR(val)}</td><td>${idx === jackpotIndex ? 'JACKPOT 🎉' : 'Biasa'}</td>`;
        document.getElementById('recap-body').appendChild(row);

        sisaBudget -= val;
        document.getElementById('sisa-val').innerText = formatIDR(Math.max(0, sisaBudget));
    }
</script>
</body>
</html>
