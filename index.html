<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THR Premium v26.0 - Catch The Angpao</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d0d; --gold: #d4af37; --dark: #051a06; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; min-height: 100vh; overflow: hidden; touch-action: manipulation; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #113311 0%, #051a06 100%); z-index: -1; }
        .container { max-width: 450px; margin: auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        .card { background: var(--glass); border-radius: 30px; padding: 25px; color: #111; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid var(--gold); }
        
        h1 { color: var(--gold); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin: 0; font-size: 1.5em; text-align: center; }
        
        .btn { border: none; padding: 16px; border-radius: 15px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; font-family: inherit; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #1b5e20); color: var(--gold); border: 1px solid var(--gold); }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #b8860b); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #ccc; color: #666; font-size: 0.85em; padding: 10px; }

        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; box-sizing: border-box; text-align: center; }

        /* --- FLYING AREA --- */
        #game-area { position: relative; flex-grow: 1; width: 100%; overflow: hidden; }
        
        .flying-angpao {
            position: absolute; width: 70px; height: 90px;
            background: #d32f2f; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2em; border: 2px solid var(--gold);
            cursor: pointer; user-select: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10; touch-action: none;
        }

        .flying-angpao::after { content: '🧧'; }

        /* Animasi jatuh */
        @keyframes fall {
            from { transform: translateY(-150px) rotate(0deg); }
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Grid for Game 1 */
        .grid-game { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .game-item { background: #eee; height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2em; border-bottom: 4px solid #ccc; }
        .game-item.selected-by-me { background: var(--gold) !important; color: white; border-color: #997a1d; }
        .game-item.taken { background: #ddd !important; opacity: 0.5; }

        /* Slot */
        .slot-container { background: #000; padding: 20px; border-radius: 20px; border: 3px solid var(--gold); text-align: center; }
        .slot-display { font-size: 2em; font-weight: 800; color: var(--gold); height: 80px; display: flex; align-items: center; justify-content: center; }
        
        /* Recap Table (Host Only) */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75em; }
        td, th { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    <div id="ui-layer">
        <h1 id="main-title">THR ONLINE</h1>
        <p style="text-align:center; font-size:0.7em; color: #aaa; margin:0 0 10px 0;">v26.0 Professional Edition</p>

        <div id="screen-start" class="card">
            <button class="btn btn-primary" onclick="goTo('screen-host-setup')">SEBAGAI HOST (YUDI)</button>
            <button class="btn btn-gold" onclick="goTo('screen-part-join')">SEBAGAI PESERTA</button>
        </div>

        <div id="screen-host-setup" class="card" style="display:none;">
            <h3>Room Config</h3>
            <input type="password" id="host-pass" placeholder="Password Admin">
            <input type="number" id="host-budget" placeholder="Total Budget" value="1000000">
            <button class="btn btn-primary" onclick="initHost()">CREATE ROOM</button>
            <button class="btn btn-outline" onclick="goTo('screen-start')">Kembali</button>
        </div>

        <div id="screen-host-lobby" class="card" style="display:none;">
            <div id="qr-code" style="background:#fff; padding:10px; display:inline-block; border-radius:15px; margin-bottom:10px;"></div>
            <div style="font-weight: 800; color: var(--primary);">KODE: <span id="display-session-id">----</span></div>
            <select id="select-game-type">
                <option value="angka">🔢 Game 1: Tebak Angka</option>
                <option value="pancing">🧧 Game 2: REBUTAN TERBANG!</option>
                <option value="slot">🎰 Game 3: Slot Keberuntungan</option>
            </select>
            <div id="host-player-count" style="font-size: 0.8em; color: #666; margin: 5px 0;">Menunggu...</div>
            <button class="btn btn-primary" onclick="launchGame()">MULAI PERMAINAN 🏁</button>
        </div>

        <div id="screen-part-join" class="card" style="display:none;">
            <input type="text" id="part-name" placeholder="Nama Kamu">
            <input type="text" id="part-session-id" placeholder="Kode 4 Digit">
            <button class="btn btn-primary" onclick="initParticipant()">GABUNG</button>
        </div>

        <div id="screen-part-lobby" class="card" style="display:none; text-align:center;">
            <div style="font-size: 3em;">⏳</div>
            <p>Sudah terhubung. Tunggu aba-aba Yudi ya!</p>
        </div>
    </div>

    <div id="screen-game" style="display:none; height: 100%;">
        <div style="background: rgba(255,255,255,0.9); padding: 10px; border-radius: 0 0 20px 20px; color:#111; display:flex; justify-content:space-between; align-items:center; z-index:100; position:relative;">
            <b id="game-title-display">GAME</b>
            <span id="my-name-tag" style="font-size:0.7em; background:#ccc; padding:2px 8px; border-radius:5px;"></span>
        </div>
        
        <div id="game-area"></div>

        <div id="host-panel" class="card" style="display:none; margin-top:10px; max-height: 40vh; overflow-y: auto;">
            <button class="btn btn-gold" id="btn-reveal-all" onclick="revealAll()">BUKA HASIL</button>
            <button class="btn btn-outline" onclick="resetToLobby()">GANTI GAME</button>
            <table>
                <thead><tr><th>Nama</th><th>Hasil</th></tr></thead>
                <tbody id="host-recap-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKuKWKtrcCnZdBPDo3X41Xv5ydKYSaSEs",
        authDomain: "thr-yudi.firebaseapp.com",
        databaseURL: "https://thr-yudi-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "thr-yudi",
        storageBucket: "thr-yudi.firebasestorage.app",
        messagingSenderId: "118870501569",
        appId: "1:118870501569:web:b951a0eb7bde9ce026cc40"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let sessionData = null, myName = "", currentSessionId = "", isHost = false, hasPicked = false, spoken = false;

    function goTo(id) {
        document.querySelectorAll('.card, #screen-game').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function initHost() {
        if(document.getElementById('host-pass').value !== "yudi123") return alert("Wrong Pass!");
        isHost = true;
        if(!currentSessionId) currentSessionId = Math.floor(1000 + Math.random() * 9000).toString();
        db.ref('active_sessions/' + currentSessionId).update({ status: 'lobby', budget: parseInt(document.getElementById('host-budget').value) || 1000000, showResults: false, selections: null });
        document.getElementById('display-session-id').innerText = currentSessionId;
        document.getElementById("qr-code").innerHTML = "";
        new QRCode(document.getElementById("qr-code"), { text: currentSessionId, width: 120, height: 120 });
        goTo('screen-host-lobby');
        syncSession();
    }

    function launchGame() {
        const type = document.getElementById('select-game-type').value;
        db.ref('active_sessions/' + currentSessionId).once('value', snap => {
            const players = snap.val().players ? Object.keys(snap.val().players) : [];
            if(players.length === 0) return alert("Belum ada peserta!");
            let list = [], budget = snap.val().budget;
            let jackpot = Math.round((budget * 0.4)/1000)*1000;
            let base = Math.floor((budget - jackpot) / (players.length > 1 ? players.length - 1 : 1));
            list.push(jackpot);
            for(let i=0; i<players.length-1; i++) list.push(Math.round((base * (0.8 + Math.random()*0.4))/1000)*1000);
            list.sort(() => Math.random() - 0.5);
            db.ref('active_sessions/' + currentSessionId).update({ status: 'playing', gameType: type, budgetList: list, showResults: (type === 'slot') });
        });
    }

    function resetToLobby() {
        hasPicked = false; spoken = false;
        db.ref('active_sessions/' + currentSessionId).update({ status: 'lobby', selections: null, showResults: false });
    }

    function initParticipant() {
        myName = document.getElementById('part-name').value.trim();
        currentSessionId = document.getElementById('part-session-id').value.trim();
        if(!myName || !currentSessionId) return alert("Data kosong!");
        db.ref(`active_sessions/${currentSessionId}/players/${myName}`).set(true).then(() => {
            document.getElementById('my-name-tag').innerText = myName;
            goTo('screen-part-lobby');
            syncSession();
        });
    }

    function syncSession() {
        db.ref('active_sessions/' + currentSessionId).on('value', snap => {
            sessionData = snap.val();
            if(!sessionData) return;
            const players = sessionData.players ? Object.keys(sessionData.players) : [];
            if(isHost) document.getElementById('host-player-count').innerText = `${players.length} Peserta`;
            if(sessionData.status === 'playing') {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('screen-game').style.display = 'block';
                renderGameUI();
            } else if(sessionData.status === 'lobby') {
                document.getElementById('ui-layer').style.display = 'block';
                goTo(isHost ? 'screen-host-lobby' : 'screen-part-lobby');
            }
        });
    }

    function renderGameUI() {
        const area = document.getElementById('game-area');
        const type = sessionData.gameType;
        document.getElementById('game-title-display').innerText = type.toUpperCase();
        
        if(isHost) {
            document.getElementById('host-panel').style.display = 'block';
            document.getElementById('btn-reveal-all').style.display = (type === 'slot') ? 'none' : 'block';
            area.innerHTML = ""; renderHostRecap();
        } else {
            document.getElementById('host-panel').style.display = 'none';
            if(type === 'slot') renderSlot(); 
            else if(type === 'pancing') renderFlying(); 
            else renderGrid();
        }
    }

    // --- GAME 1: GRID ---
    function renderGrid() {
        const area = document.getElementById('game-area');
        area.innerHTML = `<div class="grid-game" style="padding:20px"></div>`;
        const grid = area.querySelector('.grid-game');
        sessionData.budgetList.forEach((val, i) => {
            const sel = sessionData.selections ? sessionData.selections[i] : null;
            const btn = document.createElement('div');
            let isMine = sel && sel.name === myName;
            btn.className = `game-item ${isMine ? 'selected-by-me' : (sel ? 'taken' : '')}`;
            if(sessionData.showResults && isMine) { btn.innerText = `Rp${val.toLocaleString()}`; handleVoice(val); }
            else if(sel) { btn.innerText = isMine ? "SAYA" : "X"; }
            else { btn.innerText = i + 1; }
            btn.onclick = () => { if(!hasPicked && !sel && !sessionData.showResults) securePick(i, val); };
            grid.appendChild(btn);
        });
    }

    // --- GAME 2: FLYING REBUTAN ---
    function renderFlying() {
        const area = document.getElementById('game-area');
        
        // Cek apakah saya sudah dapat
        let mySel = null;
        if(sessionData.selections) {
            Object.entries(sessionData.selections).forEach(([idx, s]) => { if(s.name === myName) mySel = {idx, val: s.val}; });
        }

        if(mySel) {
            area.innerHTML = `<div style="text-align:center; margin-top:50px;">
                <div style="font-size:5em;">🧧</div>
                <h2 style="color:var(--gold)">BERHASIL DITANGKAP!</h2>
                ${sessionData.showResults ? `<h1 style="color:white">Rp${mySel.val.toLocaleString()}</h1>` : `<p>Tunggu Yudi buka hasilnya...</p>`}
            </div>`;
            if(sessionData.showResults) handleVoice(mySel.val);
            return;
        }

        area.innerHTML = ""; // Bersihkan area untuk animasi
        sessionData.budgetList.forEach((val, i) => {
            const isTaken = sessionData.selections && sessionData.selections[i];
            if(!isTaken) {
                const angpao = document.createElement('div');
                angpao.className = "flying-angpao";
                // Posisi random & Animasi random
                angpao.style.left = Math.random() * 80 + "%";
                angpao.style.animation = `fall ${3 + Math.random() * 4}s linear infinite`;
                angpao.style.animationDelay = Math.random() * 5 + "s";
                
                angpao.onclick = () => { if(!hasPicked) securePick(i, val); };
                area.appendChild(angpao);
            }
        });
    }

    // --- GAME 3: SLOT ---
    function renderSlot() {
        const area = document.getElementById('game-area');
        let myWin = null;
        if(sessionData.selections) Object.values(sessionData.selections).forEach(s => { if(s.name === myName) myWin = s.val; });
        if(myWin) {
            area.innerHTML = `<div class="slot-container" style="margin:50px 20px;"><div class="slot-display">Rp${myWin.toLocaleString()}</div></div>`;
            handleVoice(myWin);
        } else {
            area.innerHTML = `<div class="slot-container" style="margin:50px 20px;"><div id="slot-box" class="slot-display">🎰</div></div>
                              <button class="btn btn-gold" onclick="secureSlotSpin()" style="width:80%; margin: 10px 10%;">SPIN!</button>`;
        }
    }

    function securePick(index, value) {
        db.ref(`active_sessions/${currentSessionId}/selections/${index}`).transaction(curr => {
            if (curr === null) return { name: myName, val: value };
            else return;
        }, (err, ok) => { if (ok) { hasPicked = true; confetti(); } });
    }

    function secureSlotSpin() {
        const box = document.getElementById('slot-box');
        box.innerText = "🌀";
        setTimeout(() => {
            db.ref(`active_sessions/${currentSessionId}`).once('value', snap => {
                const data = snap.val();
                let taken = data.selections ? Object.keys(data.selections).map(Number) : [];
                let avail = data.budgetList.map((_, i) => i).filter(i => !taken.includes(i));
                let targetIdx = avail[Math.floor(Math.random() * avail.length)];
                let targetVal = data.budgetList[targetIdx];
                db.ref(`active_sessions/${currentSessionId}/selections/${targetIdx}`).transaction(c => c === null ? {name: myName, val: targetVal} : undefined, (err, ok) => {
                    if(ok) confetti(); else secureSlotSpin();
                });
            });
        }, 1500);
    }

    function renderHostRecap() {
        const body = document.getElementById('host-recap-body');
        body.innerHTML = "";
        Object.keys(sessionData.players || {}).forEach(p => {
            let win = "---";
            if(sessionData.selections) {
                Object.values(sessionData.selections).forEach(s => {
                    if(s.name === p) win = sessionData.showResults ? `Rp${s.val.toLocaleString()}` : `<span style="color:green">✔ OK</span>`;
                });
            }
            body.innerHTML += `<tr><td>${p}</td><td>${win}</td></tr>`;
        });
    }

    function handleVoice(amt) {
        if(spoken) return;
        spoken = true;
        const msg = new SpeechSynthesisUtterance(`Selamat ${myName}, kamu mendapatkan T H R sebesar ${amt} rupiah!`);
        msg.lang = 'id-ID'; window.speechSynthesis.speak(msg);
    }

    function revealAll() { db.ref(`active_sessions/${currentSessionId}/showResults`).set(true); confetti(); }
</script>
</body>
</html>
