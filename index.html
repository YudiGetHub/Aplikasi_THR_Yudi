<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THR Yudi v38.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d0d; --gold: #d4af37; --dark: #051a06; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #113311 0%, #051a06 100%); z-index: -1; }
        .container { max-width: 450px; margin: auto; padding: 10px; display: flex; flex-direction: column; min-height: 100vh; }
        
        .card { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 15px; color: #111; border: 2px solid var(--gold); margin-bottom: 10px; text-align: center; }
        
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 8px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: white; box-shadow: 0 4px 0 #b8860b; }
        .btn-danger { background: #d32f2f; color: white; box-shadow: 0 4px 0 #9a1f1f; }
        .btn-primary { background: var(--primary); color: var(--gold); }

        input, select { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; 
            text-align: center; font-family: inherit; box-sizing: border-box; display: block;
        }

        #game-box { position: relative; width: 100%; height: 320px; background: rgba(0,0,0,0.5); border-radius: 15px; overflow: hidden; border: 2px solid var(--gold); margin-bottom: 10px; }
        
        /* Game Visuals */
        .slot-display { font-size: 3em; font-weight: 800; color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,0.5); margin-top: 70px; }
        .angpao { position: absolute; width: 45px; height: 65px; background: #e63946; border: 2px solid var(--gold); border-radius: 5px; animation: fall linear infinite; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
        .angpao::after { content: '🧧'; }
        @keyframes fall { 0% { transform: translateY(-80px); } 100% { transform: translateY(320px); } }

        /* Red Light Green Light Style */
        .light-indicator { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: 800; transition: 0.3s; }
        .light-red { background: #ff4d4d; color: #fff; }
        .light-green { background: #47d147; color: #fff; }
        .walk-btn { width: 120px; height: 120px; border-radius: 50%; background: var(--gold); color: white; font-size: 1.2em; font-weight: 800; border: 5px solid white; margin: 20px auto; cursor: pointer; box-shadow: 0 6px 0 #b8860b; }
        .walk-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .progress-bar { width: 80%; height: 20px; background: #eee; border-radius: 10px; margin: 10px auto; overflow: hidden; border: 1px solid #ccc; }
        #progress-inner { width: 0%; height: 100%; background: var(--primary); transition: 0.2s; }

        .admin-panel { background: var(--white); border-radius: 15px; padding: 15px; color: #333; margin-top: 10px; border: 3px solid var(--gold); }
        .recap-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        .recap-table th { background: #f0f0f0; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
        .recap-table td { padding: 8px; border-bottom: 1px solid #eee; }

        .grid-game { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px; }
        .cell { background: #fff; height: 55px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ddd; color: #333; }
        .cell.mine { background: var(--gold) !important; color: white; }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    
    <div id="screen-start" class="card">
        <h1 style="color:var(--primary); margin:0;">THR YUDI</h1>
        <button class="btn btn-primary" onclick="goTo('screen-host-setup')">ADMIN MODE</button>
        <button class="btn btn-gold" onclick="goTo('screen-part-join')">PESERTA MASUK</button>
    </div>

    <div id="screen-host-setup" class="card" style="display:none;">
        <input type="password" id="h-pass" placeholder="Password Admin">
        <input type="number" id="h-budget" value="1000000">
        <button class="btn btn-primary" onclick="initHost()">GAS ROOM</button>
    </div>

    <div id="screen-host-lobby" class="card" style="display:none;">
        <div id="qr-code" style="display:inline-block; background:white; padding:10px; border-radius:10px;"></div>
        <h2 style="margin:10px 0;">KODE: <span id="room-id">----</span></h2>
        <select id="g-type">
            <option value="angka">🔢 Tebak Angka</option>
            <option value="pancing">🧧 Angpao Terbang</option>
            <option value="redlight">🚦 Lampu Merah Hijau</option>
            <option value="slot">🎰 Slot Untung</option>
        </select>
        <p id="player-count">0 Peserta</p>
        <button class="btn btn-primary" onclick="startGame()">START GAME</button>
    </div>

    <div id="screen-part-join" class="card" style="display:none;">
        <h3>Join Room</h3>
        <input type="text" id="p-name" placeholder="Nama Lengkap">
        <input type="text" id="p-id" placeholder="Kode Room">
        <button class="btn btn-primary" onclick="initPart()">GABUNG</button>
        <div id="reader" style="width:100%; margin-top:10px;"></div>
        <button class="btn btn-gold" onclick="startScan()">SCAN QR</button>
    </div>

    <div id="screen-part-lobby" class="card" style="display:none;">
        <h2 style="color:var(--primary)">SABAR...</h2>
        <p>Lagi nunggu Yudi start gamenya.</p>
        <p id="wait-name" style="font-weight:bold; color:var(--gold);"></p>
    </div>

    <div id="screen-game" style="display:none;">
        <div class="card" style="padding:10px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <b id="game-label">GAME</b>
            <span id="user-label" style="background:#eee; padding:2px 8px; border-radius:5px; color:#000; font-size:0.8em;"></span>
        </div>

        <div id="game-box"></div>

        <div id="host-controls" style="display:none;">
            <button class="btn btn-gold" onclick="revealAll()">🎁 BUKA HASIL SEMUA</button>
            <button class="btn btn-danger" onclick="resetGame()">RESET / BALIK LOBBY</button>
            
            <div class="admin-panel">
                <h4 style="margin:0; border-bottom:1px solid #ddd;">TABEL REKAP</h4>
                <table class="recap-table">
                    <thead><tr><th>Nama</th><th>Status/Hasil</th></tr></thead>
                    <tbody id="recap-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKuKWKtrcCnZdBPDo3X41Xv5ydKYSaSEs",
        authDomain: "thr-yudi.firebaseapp.com",
        databaseURL: "https://thr-yudi-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "thr-yudi",
        storageBucket: "thr-yudi.firebasestorage.app",
        messagingSenderId: "118870501569",
        appId: "1:118870501569:web:b951a0eb7bde9ce026cc40"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let room = null, myName = "", myRoomId = "", isHost = false, hasPicked = false, spoken = false;
    let slotInterval = null, walkProgress = 0, currentLight = "red";

    function goTo(id) {
        document.querySelectorAll('.card, #screen-game, #screen-part-lobby').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function initHost() {
        if(document.getElementById('h-pass').value !== "yudi123") return alert("Akses Ditolak!");
        isHost = true;
        myRoomId = Math.floor(1000 + Math.random() * 9000).toString();
        db.ref('active_sessions/' + myRoomId).set({ status: 'lobby', budget: parseInt(document.getElementById('h-budget').value), showResults: false });
        document.getElementById('room-id').innerText = myRoomId;
        document.getElementById('qr-code').innerHTML = "";
        new QRCode(document.getElementById('qr-code'), { text: myRoomId, width: 130, height: 130 });
        goTo('screen-host-lobby');
        sync();
    }

    function initPart() {
        myName = document.getElementById('p-name').value.trim();
        myRoomId = document.getElementById('p-id').value.trim();
        if(!myName || !myRoomId) return alert("Isi Nama & Kode!");
        db.ref(`active_sessions/${myRoomId}/players/${myName}`).set(true);
        document.getElementById('user-label').innerText = myName;
        document.getElementById('wait-name').innerText = myName;
        goTo('screen-part-lobby');
        sync();
    }

    function sync() {
        db.ref('active_sessions/' + myRoomId).on('value', snap => {
            room = snap.val();
            if(!room) return;
            if(isHost) document.getElementById('player-count').innerText = Object.keys(room.players || {}).length + " Peserta";
            if(room.status === 'playing') {
                goTo('screen-game');
                document.getElementById('host-controls').style.display = isHost ? 'block' : 'none';
                if(room.gameType === 'redlight') handleLightSync();
                render();
            } else if(room.status === 'lobby') {
                if(isHost) goTo('screen-host-lobby');
                else if(myName) goTo('screen-part-lobby');
            }
        });
    }

    function startGame() {
        const type = document.getElementById('g-type').value;
        db.ref('active_sessions/' + myRoomId).once('value', snap => {
            const ps = Object.keys(snap.val().players || {});
            if(ps.length === 0) return alert("Belum ada peserta!");
            let budget = snap.val().budget, list = [], current = 0;
            for(let i=0; i<ps.length; i++) {
                if(i === ps.length - 1) list.push(budget - current);
                else {
                    let s = Math.round((budget / ps.length) * (0.7 + Math.random() * 0.6) / 1000) * 1000;
                    list.push(s); current += s;
                }
            }
            list.sort((a, b) => b - a);
            db.ref('active_sessions/' + myRoomId).update({ status: 'playing', gameType: type, budgetList: list, showResults: (type === 'slot' || type === 'redlight'), light: 'red' });
            if(type === 'redlight') startLightCycle();
        });
    }

    function render() {
        const box = document.getElementById('game-box');
        box.innerHTML = "";
        document.getElementById('game-label').innerText = room.gameType.toUpperCase();
        if(isHost) {
            box.innerHTML = "<p style='text-align:center; padding-top:120px; color:#aaa;'>ADMIN MONITOR</p>";
            updateRecap();
        } else {
            if(room.gameType === 'pancing') renderPancing();
            else if(room.gameType === 'angka') renderAngka();
            else if(room.gameType === 'redlight') renderRedLight();
            else renderSlot();
        }
    }

    // --- GAME 1: ANGPAO TERBANG ---
    function renderPancing() {
        const box = document.getElementById('game-box');
        let myD = null;
        if(room.selections) Object.values(room.selections).forEach(s => { if(s.name === myName) myD = s; });
        if(myD) {
            box.innerHTML = `<div style="text-align:center; padding-top:80px;"><h2>🧧 DAPET!</h2>
            ${room.showResults ? `<h1>Rp${myD.val.toLocaleString()}</h1>` : '<p>Sabar, nunggu Yudi...</p>'}</div>`;
            if(room.showResults) handleVoice(myD.val); return;
        }
        room.budgetList.forEach((val, i) => {
            if(!room.selections || !room.selections[i]) {
                const el = document.createElement('div'); el.className = "angpao";
                el.style.left = Math.random() * 80 + "%"; el.style.animationDuration = (2 + Math.random() * 2) + "s";
                el.onclick = () => pick(i, val); box.appendChild(el);
            }
        });
    }

    // --- GAME 2: TEBAK ANGKA ---
    function renderAngka() {
        const box = document.getElementById('game-box');
        box.innerHTML = "<div class='grid-game'></div>";
        const grid = box.querySelector('.grid-game');
        room.budgetList.forEach((val, i) => {
            const sel = room.selections ? room.selections[i] : null;
            const el = document.createElement('div');
            el.className = `cell ${sel ? (sel.name === myName ? 'mine' : 'taken') : ''}`;
            if(room.showResults && sel && sel.name === myName) { el.innerText = `Rp${val.toLocaleString()}`; handleVoice(val); }
            else { el.innerText = sel ? (sel.name === myName ? "OK" : "X") : i+1; }
            el.onclick = () => { if(!hasPicked && !sel) pick(i, val); };
            grid.appendChild(el);
        });
    }

    // --- GAME 3: SLOT UNTUNG (DENGAN STOP) ---
    function renderSlot() {
        const box = document.getElementById('game-box');
        let myW = null;
        if(room.selections) Object.values(room.selections).forEach(s => { if(s.name === myName) myW = s.val; });
        if(myW) { 
            clearInterval(slotInterval);
            box.innerHTML = `<div style="text-align:center; padding-top:100px;"><h1>🎰 Rp${myW.toLocaleString()}</h1></div>`; 
            handleVoice(myW); 
        } else {
            box.innerHTML = `<div style="padding:20px; text-align:center;"><div id="slot-val" class="slot-display">Rp????</div>
                <div id="slot-ctrl"><button id="btn-spin" class="btn btn-gold" onclick="startSlotAnim()">SPIN SLOT 🎰</button></div></div>`;
        }
    }

    function startSlotAnim() {
        const btnArea = document.getElementById('slot-ctrl');
        const slotVal = document.getElementById('slot-val');
        btnArea.innerHTML = `<button class="btn btn-danger" onclick="stopSlotAndPick()">STOP 🛑</button>`;
        clearInterval(slotInterval);
        slotInterval = setInterval(() => {
            const randomVal = Math.floor(Math.random() * 100) * 1000;
            slotVal.innerText = `Rp${randomVal.toLocaleString()}`;
        }, 80);
    }

    function stopSlotAndPick() {
        clearInterval(slotInterval);
        db.ref(`active_sessions/${myRoomId}`).once('value', snap => {
            const d = snap.val();
            let av = d.budgetList.map((_, i) => i).filter(idx => !d.selections || !d.selections[idx]);
            if(av.length > 0) { pick(av[0], d.budgetList[av[0]]); }
        });
    }

    // --- GAME 4: LAMPU MERAH HIJAU ---
    function startLightCycle() {
        if(!isHost) return;
        const cycle = () => {
            if(!room || room.status !== 'playing') return;
            let next = room.light === 'red' ? 'green' : 'red';
            let time = next === 'green' ? (2000 + Math.random() * 3000) : (1500 + Math.random() * 2000);
            db.ref(`active_sessions/${myRoomId}/light`).set(next);
            setTimeout(cycle, time);
        };
        cycle();
    }

    function handleLightSync() {
        currentLight = room.light;
        const indicator = document.getElementById('light-ind');
        if(indicator) {
            indicator.className = `light-indicator light-${currentLight}`;
            indicator.innerText = currentLight === 'red' ? 'BERHENTI! 🛑' : 'JALAN! 🏃';
        }
    }

    function renderRedLight() {
        const box = document.getElementById('game-box');
        let myD = null;
        if(room.selections) Object.values(room.selections).forEach(s => { if(s.name === myName) myD = s; });

        if(myD && walkProgress >= 100) {
            box.innerHTML = `<div style="text-align:center; padding-top:80px;"><h2>🏁 FINISH!</h2>
            ${room.showResults ? `<h1>Rp${myD.val.toLocaleString()}</h1>` : '<p>Tunggu hasil diumumkan Yudi...</p>'}</div>`;
            if(room.showResults) handleVoice(myD.val); return;
        }

        box.innerHTML = `
            <div id="light-ind" class="light-indicator light-${currentLight}">${currentLight === 'red' ? 'BERHENTI! 🛑' : 'JALAN! 🏃'}</div>
            <div class="progress-bar"><div id="progress-inner" style="width:${walkProgress}%"></div></div>
            <button class="walk-btn" onclick="stepForward()">MAJU</button>
        `;
    }

    function stepForward() {
        if(walkProgress >= 100) return;
        if(currentLight === 'red') {
            walkProgress = Math.max(0, walkProgress - 15);
            alert("Kena tangkap! Mundur!");
        } else {
            walkProgress += 5;
        }
        document.getElementById('progress-inner').style.width = walkProgress + "%";
        if(walkProgress >= 100) {
            db.ref(`active_sessions/${myRoomId}/selections`).push({ name: myName, progress: 100, time: Date.now() });
            confetti();
        }
    }

    // --- CORE LOGICS ---
    function pick(i, v) {
        db.ref(`active_sessions/${myRoomId}/selections/${i}`).transaction(c => c === null ? { name: myName, val: v } : undefined, (err, ok) => { if(ok) { hasPicked = true; confetti(); } });
    }

    function updateRecap() {
        const body = document.getElementById('recap-body'); body.innerHTML = "";
        if(room.gameType === 'redlight' && room.selections) {
            let res = Object.values(room.selections).sort((a, b) => a.time - b.time);
            res.forEach((s, idx) => {
                let nominal = room.budgetList[idx] || 0;
                if(room.showResults && s.val === undefined) {
                    db.ref(`active_sessions/${myRoomId}/selections`).once('value', snap => {
                        snap.forEach(c => { if(c.val().name === s.name) c.ref.update({val: nominal}); });
                    });
                }
                body.innerHTML += `<tr><td>${s.name}</td><td>Finish #${idx+1} ⮕ <b>Rp${nominal.toLocaleString()}</b></td></tr>`;
            });
        } else {
            Object.keys(room.players || {}).forEach(p => {
                let r = "⏳";
                if(room.selections) Object.values(room.selections).forEach(s => { if(s.name === p) r = room.showResults ? `<b>Rp${s.val.toLocaleString()}</b>` : '✅'; });
                body.innerHTML += `<tr><td>${p}</td><td>${r}</td></tr>`;
            });
        }
    }

    function startScan() {
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render((t) => { document.getElementById('p-id').value = t; scanner.clear(); });
    }

    function handleVoice(amt) {
        if(spoken) return; spoken = true;
        const msg = new SpeechSynthesisUtterance(`Selamat ${myName}, dapet ${amt} rupiah!`);
        msg.lang = 'id-ID'; window.speechSynthesis.speak(msg);
    }

    function revealAll() { db.ref(`active_sessions/${myRoomId}/showResults`).set(true); confetti(); }
    function resetGame() { 
        hasPicked = false; spoken = false; walkProgress = 0;
        clearInterval(slotInterval);
        db.ref(`active_sessions/${myRoomId}`).update({ status: 'lobby', selections: null, showResults: false, light: 'red' }); 
    }
</script>
</body>
</html>
