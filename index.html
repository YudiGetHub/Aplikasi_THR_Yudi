<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THR Sesi Online - Keluarga Yudi</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b5e20; --gold: #ffd700; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: #002200; color: var(--white); margin: 0; padding: 0; min-height: 100vh; }
        .container { max-width: 500px; margin: auto; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 20px; padding: 25px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1em; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .lobby-list { list-style: none; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .lobby-item { background: #f0f0f0; padding: 10px; border-radius: 8px; font-weight: 600; }
        #qr-code { display: flex; justify-content: center; margin: 15px 0; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        .badge { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8em; }
        /* Game Styles */
        .grid-angka { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { background: #eee; height: 70px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; font-weight: bold; cursor: pointer; }
        .num-btn.revealed { background: var(--primary); color: white; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:var(--gold); text-shadow: 2px 2px #000;">🌙 THR SESSION 🌙</h1>

    <div id="screen-start" class="card">
        <h2>Selamat Datang</h2>
        <p>Pilih peran kamu untuk memulai:</p>
        <button class="btn-main" onclick="showHostSetup()">HOST (Pemberi THR)</button>
        <button class="btn-gold" onclick="showParticipantJoin()">PESERTA (Penerima THR)</button>
    </div>

    <div id="screen-host-setup" class="card" style="display:none;">
        <h3>Seting Sesi THR</h3>
        <input type="password" id="host-pass" placeholder="Password Admin">
        <input type="number" id="host-budget" placeholder="Total Budget (Rp)" value="500000">
        <input type="number" id="host-limit" placeholder="Maksimal Peserta" value="10">
        <button class="btn-main" onclick="createSession()">BUAT SESI & KODE 🚀</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:10px;">Kembali</button>
    </div>

    <div id="screen-host-lobby" class="card" style="display:none;">
        <h3 style="margin-bottom:5px;">Lobby Host</h3>
        <div id="qr-code"></div>
        <p>Kode Join: <strong id="display-session-id" style="font-size: 1.5em; color: var(--primary);">---</strong></p>
        <div class="badge">Menunggu Peserta... (<span id="count-p">0</span>)</div>
        <ul id="host-player-list" class="lobby-list"></ul>
        <select id="select-game-type" style="width:100%; padding:10px; margin:10px 0; border-radius:10px;">
            <option value="angka">🔢 Game Tebak Angka</option>
            <option value="bar">🎰 Game Slot Bar</option>
            <option value="pancing">🎣 Game Pancing Amplop</option>
        </select>
        <button class="btn-main" onclick="startNow()">MULAI GAME SEKARANG 🏁</button>
    </div>

    <div id="screen-part-join" class="card" style="display:none;">
        <h3>Gabung Game</h3>
        <input type="text" id="part-name" placeholder="Nama Kamu (Contoh: Yudi)">
        <div id="reader" style="display:none;"></div>
        <button class="btn-gold" id="btn-scan" onclick="startScanner()">SCAN QR HOST 📷</button>
        <p>Atau masukkan kode manual:</p>
        <input type="text" id="part-session-id" placeholder="Kode Sesi (Contoh: 4921)">
        <button class="btn-main" onclick="joinSession()">GABUNG KE LOBBY</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:10px;">Kembali</button>
    </div>

    <div id="screen-part-lobby" class="card" style="display:none;">
        <h3>Sudah Terhubung! ✅</h3>
        <p>Halo, <strong id="display-my-name">...</strong></p>
        <p>Sabar ya, menunggu Host memulai permainan...</p>
        <div class="lobby-list" id="part-player-list"></div>
    </div>

    <div id="screen-game" class="card" style="display:none;">
        <h2 id="game-title">Game Dimulai!</h2>
        <div id="game-content"></div>
        <div class="recap-container">
            <table style="width:100%; font-size:0.8em; margin-top:15px;" id="game-recap"></table>
        </div>
    </div>
</div>

<script>
    // Konfigurasi Firebase Yudi
    const firebaseConfig = {
        apiKey: "AIzaSyAKuKWKtrcCnZdBPDo3X41Xv5ydKYSaSEs",
        authDomain: "thr-yudi.firebaseapp.com",
        databaseURL: "https://thr-yudi-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "thr-yudi",
        storageBucket: "thr-yudi.firebasestorage.app",
        messagingSenderId: "118870501569",
        appId: "1:118870501569:web:b951a0eb7bde9ce026cc40"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myName = "";
    let currentSessionId = "";
    let isHost = false;

    function showHostSetup() { document.getElementById('screen-start').style.display='none'; document.getElementById('screen-host-setup').style.display='block'; }
    function showParticipantJoin() { document.getElementById('screen-start').style.display='none'; document.getElementById('screen-part-join').style.display='block'; }

    // HOST LOGIC
    function createSession() {
        if(document.getElementById('host-pass').value !== "yudi123") return alert("Password Salah!");
        isHost = true;
        currentSessionId = Math.floor(1000 + Math.random() * 9000).toString();
        
        const budget = parseInt(document.getElementById('host-budget').value);
        const limit = parseInt(document.getElementById('host-limit').value);

        db.ref('sessions/' + currentSessionId).set({
            status: 'lobby',
            budget: budget,
            limit: limit,
            gameType: 'angka',
            players: {}
        }).then(() => {
            document.getElementById('screen-host-setup').style.display='none';
            document.getElementById('screen-host-lobby').style.display='block';
            document.getElementById('display-session-id').innerText = currentSessionId;
            generateQR(currentSessionId);
            listenToLobby();
        });
    }

    function generateQR(id) {
        new QRCode(document.getElementById("qr-code"), { text: id, width: 128, height: 128 });
    }

    // PARTICIPANT LOGIC
    function startScanner() {
        document.getElementById('reader').style.display='block';
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render((text) => {
            document.getElementById('part-session-id').value = text;
            scanner.clear();
            document.getElementById('reader').style.display='none';
        });
    }

    function joinSession() {
        myName = document.getElementById('part-name').value;
        currentSessionId = document.getElementById('part-session-id').value;
        if(!myName || !currentSessionId) return alert("Isi Nama dan Kode!");

        db.ref('sessions/' + currentSessionId).once('value', snap => {
            if(!snap.exists()) return alert("Sesi tidak ditemukan!");
            db.ref('sessions/' + currentSessionId + '/players/' + myName).set(true);
            
            document.getElementById('screen-part-join').style.display='none';
            document.getElementById('screen-part-lobby').style.display='block';
            document.getElementById('display-my-name').innerText = myName;
            listenToLobby();
        });
    }

    // LOBBY SYNC
    function listenToLobby() {
        db.ref('sessions/' + currentSessionId).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            // Update Player List
            const pList = data.players ? Object.keys(data.players) : [];
            const listHtml = pList.map(p => `<li class="lobby-item">${p}</li>`).join('');
            document.getElementById(isHost ? 'host-player-list' : 'part-player-list').innerHTML = listHtml;
            if(isHost) document.getElementById('count-p').innerText = pList.length;

            // Trigger Game Start
            if(data.status === 'playing') {
                startGaming(data);
            }
        });
    }

    function startNow() {
        const type = document.getElementById('select-game-type').value;
        db.ref('sessions/' + currentSessionId).update({ status: 'playing', gameType: type });
    }

    function startGaming(data) {
        document.getElementById('screen-host-lobby').style.display='none';
        document.getElementById('screen-part-lobby').style.display='none';
        document.getElementById('screen-game').style.display='block';
        document.getElementById('game-title').innerText = "Game: " + data.gameType.toUpperCase();
        
        // Render Game Logic based on data.gameType
        if(data.gameType === 'angka') renderAngkaGame(data);
    }

    function renderAngkaGame(data) {
        const content = document.getElementById('game-content');
        content.innerHTML = `<div class="grid-angka">` + 
            [1,2,3,4,5,6,7,8,9].map(i => `<div class="num-btn" id="n-${i}" onclick="hitAngka(${i})">${i}</div>`).join('') + 
            `</div>`;
    }

    function hitAngka(num) {
        // Logika klik angka akan sinkron ke Firebase session
        confetti();
        alert("Kamu memilih angka " + num);
    }
</script>
</body>
</html>
