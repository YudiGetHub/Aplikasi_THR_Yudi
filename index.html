<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi THR Keluarga Yudi v9.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b5e20; --gold: #ffd700; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1b5e20 0%, #002200 100%); color: var(--white); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); z-index: -1; animation: moveStars 50s linear infinite; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
        .container { max-width: 500px; margin: auto; padding: 20px; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 20px; color: #333; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-top: 20px; animation: zoomIn 0.5s ease; border: 1px solid var(--gold); }
        .menu-item { background: linear-gradient(135deg, var(--primary), #003300); color: var(--gold); padding: 20px; border-radius: 15px; cursor: pointer; margin-bottom: 15px; border: 2px solid var(--gold); font-weight: 600; transition: 0.3s; }
        
        .grid-angka { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { background: #eee; height: 75px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.6em; font-weight: bold; cursor: pointer; border-bottom: 6px solid #ccc; }
        .num-btn.revealed { background: var(--white); border: 2px solid var(--primary); font-size: 0.85em; color: var(--primary); transform: rotateY(360deg); transition: 0.8s; }

        .slot-container { background: #111; padding: 25px; border-radius: 20px; border: 4px solid var(--gold); margin: 20px 0; height: 110px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 30px #000; }
        #slot-val { color: var(--gold); font-size: 2.1em; font-weight: 800; text-shadow: 0 0 15px rgba(255, 215, 0, 0.8); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1em; box-shadow: 0 5px #003300; }
        .back-btn { background: #757575; color: white; border: none; padding: 6px 15px; border-radius: 8px; float: left; cursor: pointer; margin-bottom: 10px; }
        
        .recap-container { margin-top: 25px; max-height: 250px; overflow-y: auto; text-align: left; font-size: 0.85em; background: #fff; border-radius: 15px; padding: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #f0f0f0; padding: 12px; text-align: center; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    <h1 style="color:var(--gold); margin-top:30px; text-shadow: 2px 2px #000;">🌙 EID MUBARAK 🌙</h1>

    <div id="dashboard" class="card">
        <h2 style="margin-bottom: 20px; color: var(--primary);">Main Game THR</h2>
        <div class="menu-item" onclick="openSetup('angka')">🔢 Tebak Angka Keberuntungan</div>
        <div class="menu-item" onclick="openSetup('bar')">🎰 Slot Bar (Secret Shuffle)</div>
        <p style="font-size: 0.7em; color: #888;">Eksklusif: Fitur Suara Web Speech ✅</p>
    </div>

    <div id="setup" class="card" style="display:none;">
        <button class="back-btn" onclick="showDashboard()">← Kembali</button><br>
        <h2 style="color: var(--primary);">Pengaturan Dana</h2>
        <input type="number" id="inp-peserta" placeholder="Jumlah Peserta" value="5">
        <input type="number" id="inp-budget" placeholder="Total Budget (Rp)" value="1000000">
        <button class="btn-main" onclick="initGame()">SIAPKAN HADIAH 🚀</button>
    </div>

    <div id="game-angka" class="card" style="display:none;">
        <h3>Pilih Angka Keberuntungan!</h3>
        <div class="grid-angka" id="angka-area"></div>
        <div class="recap-container">
            <table><thead><tr><th>No</th><th>Nominal THR</th></tr></thead><tbody id="recap-angka-body"></tbody></table>
        </div>
        <button class="btn-main" onclick="showDashboard()" style="background:#757575;">Tutup</button>
    </div>

    <div id="game-bar" class="card" style="display:none;">
        <h3 id="info-bar">Giliran Peserta ke-1</h3>
        <div class="slot-container">
            <div id="slot-val">SIAP?</div>
        </div>
        <button class="btn-main" id="btn-slot" onclick="handleSlot()">ACAK SEKARANG 🎰</button>
        <div class="recap-container">
            <table id="recap-bar-table"><thead><tr><th>Penerima</th><th>Hasil THR</th></tr></thead><tbody id="recap-bar-body"></tbody></table>
        </div>
        <button class="btn-main" onclick="showDashboard()" style="background:#757575; margin-top:15px;">Tutup</button>
    </div>
</div>

<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
    let mode = '';
    let budgetList = [];
    let fullOriginalList = [];
    let currentParticipant = 1;
    let isRunning = false;
    let slotInterval;

    function format(v) { return "Rp" + new Intl.NumberFormat('id-ID').format(v); }
    function showDashboard() { location.reload(); }
    
    function openSetup(m) {
        mode = m;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('setup').style.display = 'block';
    }

    // FUNGSI SUARA WEB SPEECH API (Native Browser)
    function bicara(teks) {
        if ('speechSynthesis' in window) {
            // Batalkan suara sebelumnya agar tidak tumpang tindih
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance();
            msg.text = teks;
            msg.lang = 'id-ID';
            msg.rate = 0.85; // Kecepatan agak lambat supaya jelas
            msg.pitch = 1.1; // Nada ceria
            
            window.speechSynthesis.speak(msg);
        }
    }

    function initGame() {
        let jml = parseInt(document.getElementById('inp-peserta').value);
        let budget = parseInt(document.getElementById('inp-budget').value);
        if(!jml || !budget) return alert("Isi data!");

        let jackpot = Math.round((budget * 0.35) / 1000) * 1000;
        let sisa = budget - jackpot;
        let base = Math.floor(sisa / (jml - 1));
        
        budgetList = [jackpot];
        for(let i=0; i < jml - 1; i++){
            let val = Math.round((base * (0.6 + Math.random() * 0.8)) / 1000) * 1000;
            if(val > sisa) val = base;
            budgetList.push(val);
            sisa -= val;
        }
        budgetList[1] += sisa;
        budgetList.sort(() => Math.random() - 0.5);
        fullOriginalList = [...budgetList];

        document.getElementById('setup').style.display = 'none';
        if(mode === 'angka') setupAngka(); else setupBar();
    }

    function setupAngka() {
        document.getElementById('game-angka').style.display = 'block';
        const area = document.getElementById('angka-area');
        area.innerHTML = "";
        budgetList.forEach((val, i) => {
            area.innerHTML += `<div class="num-btn" id="nb-${i}" onclick="revealAngka(${i}, ${val})">${i+1}</div>`;
        });
    }

    function revealAngka(i, val) {
        const el = document.getElementById('nb-' + i);
        if(el.classList.contains('revealed')) return;
        el.classList.add('revealed');
        el.innerText = format(val);
        
        bicara(`Selamat. Anda berhak menerima T H R sebesar ${val} rupiah.`);
        
        if(val === Math.max(...fullOriginalList)) { 
            confetti(); 
            document.getElementById('snd-win').play(); 
        }
        document.getElementById('recap-angka-body').innerHTML += `<tr><td>${i+1}</td><td>${format(val)}</td></tr>`;
    }

    function setupBar() {
        document.getElementById('game-bar').style.display = 'block';
    }

    function handleSlot() {
        const btn = document.getElementById('btn-slot');
        const display = document.getElementById('slot-val');

        if (!isRunning) {
            isRunning = true;
            btn.innerText = "BERHENTI! ✋";
            btn.style.background = "#d32f2f";
            slotInterval = setInterval(() => {
                let visualTemp = fullOriginalList[Math.floor(Math.random() * fullOriginalList.length)];
                display.innerText = format(visualTemp);
            }, 60);
        } else {
            isRunning = false;
            clearInterval(slotInterval);
            btn.disabled = true;

            let winIdx = Math.floor(Math.random() * budgetList.length);
            let winVal = budgetList[winIdx];
            display.innerText = format(winVal);

            bicara(`Luar biasa. Peserta ke ${currentParticipant} mendapatkan T H R senilai ${winVal} rupiah.`);

            document.getElementById('snd-win').play();
            confetti({particleCount: 120, spread: 80});

            document.getElementById('recap-bar-body').innerHTML += `<tr><td>Peserta ${currentParticipant}</td><td>${format(winVal)}</td></tr>`;
            budgetList.splice(winIdx, 1);
            currentParticipant++;

            setTimeout(() => {
                if (budgetList.length > 0) {
                    btn.disabled = false;
                    btn.innerText = "LANJUTKAN 🎰";
                    btn.style.background = "var(--primary)";
                    document.getElementById('info-bar').innerText = `Giliran Peserta ke-${currentParticipant}`;
                } else {
                    btn.style.display = 'none';
                    document.getElementById('info-bar').innerText = "SELESAI!";
                    display.innerText = "LUNAS 🏁";
                }
            }, 2500);
        }
    }
</script>
</body>
</html>
