<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THR Yudi v28.0 - Professional Host & Game</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a3d0d; --gold: #d4af37; --dark: #051a06; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #113311 0%, #051a06 100%); z-index: -1; }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        .card { background: var(--glass); border-radius: 25px; padding: 20px; color: #111; box-shadow: 0 15px 30px rgba(0,0,0,0.5); border: 1px solid var(--gold); margin-bottom: 20px; }
        
        /* Buttons */
        .btn { border: none; padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; font-family: inherit; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #1b5e20); color: var(--gold); border: 1px solid var(--gold); }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #b8860b); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid #ccc; color: #666; font-size: 0.8em; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; }

        /* QR Center */
        .qr-wrapper { display: flex; flex-direction: column; align-items: center; margin: 20px 0; }
        #qr-code { background: #fff; padding: 15px; border-radius: 20px; border: 4px solid var(--gold); }

        /* Game Area */
        #game-area { position: relative; width: 100%; min-height: 350px; overflow: hidden; background: rgba(255,255,255,0.05); border-radius: 20px; }
        
        /* Flying Angpao */
        .angpao-item {
            position: absolute; width: 55px; height: 75px; background: #d32f2f;
            border-radius: 8px; border: 2px solid var(--gold); display: flex;
            align-items: center; justify-content: center; font-size: 1.8em;
            cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fallDown linear infinite;
        }
        .angpao-item::after { content: '🧧'; }
        @keyframes fallDown {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(450px) rotate(360deg); opacity: 0.8; }
        }

        /* Grid */
        .grid-game { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; }
        .game-node { background: #eee; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-bottom: 3px solid #ccc; }
        .mine { background: var(--gold) !important; color: white; border-color: #997a1d; }
        .taken { opacity: 0.4; background: #ddd; }

        /* Table Host */
        .host-table { width: 100%; margin-top: 15px; font-size: 0.85em; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        .host-table th, .host-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; color: #333; }
        .host-table th { background: #f8f8f8; font-weight: bold; }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="container">
    <div id="screen-start" class="card" style="text-align:center;">
        <h1 style="color:var(--gold); margin:0;">THR APP</h1>
        <p style="color:#666; font-size:0.8em; margin-bottom:20px;">v28.0 Professional</p>
        <button class="btn btn-primary" onclick="goTo('screen-host-setup')">ADMIN PANEL (YUDI)</button>
        <button class="btn btn-gold" onclick="goTo('screen-part-join')">GABUNG PESERTA</button>
    </div>

    <div id="screen-host-setup" class="card" style="display:none;">
        <h3 style="margin:0;">Room Configuration</h3>
        <input type="password" id="host-pass" placeholder="Password Admin">
        <input type="number" id="host-budget" placeholder="Total Budget" value="1000000">
        <button class="btn btn-primary" onclick="initHost()">CREATE SECURE ROOM</button>
        <button class="btn-outline btn" onclick="goTo('screen-start')">Back</button>
    </div>

    <div id="screen-host-lobby" class="card" style="display:none; text-align:center;">
        <div class="qr-wrapper">
            <div id="qr-code"></div>
            <p style="font-weight:bold; margin-top:10px;">KODE: <span id="display-id" style="color:var(--primary); font-size:1.5em;">----</span></p>
        </div>
        <select id="game-type">
            <option value="angka">🔢 Game 1: Tebak Angka</option>
            <option value="pancing">🧧 Game 2: Rebutan Angpao Terbang</option>
            <option value="slot">🎰 Game 3: Slot Keberuntungan</option>
        </select>
        <p id="player-count-host" style="font-size:0.8em; color:#666;">Menunggu peserta...</p>
        <button class="btn btn-primary" onclick="launchGame()">START SESSION 🏁</button>
    </div>

    <div id="screen-part-join" class="card" style="display:none;">
        <h3>Join Room</h3>
        <input type="text" id="part-name" placeholder="Nama Lengkap">
        <input type="text" id="part-id" placeholder="4-Digit Kode">
        <button class="btn btn-primary" onclick="initPart()">GABUNG</button>
        <hr>
        <div id="reader"></div>
        <button class="btn btn-gold" onclick="startScanner()">SCAN QR CODE</button>
        <button class="btn-outline btn" onclick="goTo('screen-start')">Back</button>
    </div>

    <div id="screen-game" style="display:none;">
        <div class="card" style="padding:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <b id="title-game" style="color:var(--primary)">GAME</b>
            <span id="name-tag" style="font-size:0.7em; background:#eee; padding:3px 10px; border-radius:10px;"></span>
        </div>

        <div id="game-area"></div>

        <div id="host-panel" style="display:none; margin-top:20px;">
            <div class="card">
                <button class="btn btn-gold" onclick="revealAll()">BUKA SEMUA HASIL 🎁</button>
                <button class="btn-outline btn" onclick="resetRoom()">KEMBALI KE LOBBY</button>
                <h4 style="margin:15px 0 5px 0;">Tabel Pemenang (Host Only):</h4>
                <table class="host-table">
                    <thead><tr><th>Nama</th><th>Hasil THR</th></tr></thead>
                    <tbody id="recap-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKuKWKtrcCnZdBPDo3X41Xv5ydKYSaSEs",
        authDomain: "thr-yudi.firebaseapp.com",
        databaseURL: "https://thr-yudi-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "thr-yudi",
        storageBucket: "thr-yudi.firebasestorage.app",
        messagingSenderId: "118870501569",
        appId: "1:118870501569:web:b951a0eb7bde9ce026cc40"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let session = null, myName = "", currentId = "", isHost = false, hasPicked = false, spoken = false;

    function goTo(id) {
        document.querySelectorAll('.card, #screen-game').forEach(c => c.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'screen-start') { document.getElementById('screen-start').style.display = 'block'; }
    }

    function initHost() {
        if(document.getElementById('host-pass').value !== "yudi123") return alert("Akses Ditolak");
        isHost = true;
        currentId = Math.floor(1000 + Math.random() * 9000).toString();
        db.ref('active_sessions/' + currentId).set({ status: 'lobby', budget: parseInt(document.getElementById('host-budget').value), showResults: false });
        document.getElementById('display-id').innerText = currentId;
        const qrContainer = document.getElementById("qr-code");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: currentId, width: 160, height: 160 });
        goTo('screen-host-lobby');
        listenData();
    }

    function launchGame() {
        const type = document.getElementById('game-type').value;
        db.ref('active_sessions/' + currentId).once('value', snap => {
            const players = Object.keys(snap.val().players || {});
            if(players.length === 0) return alert("Belum ada pemain");
            
            let budget = snap.val().budget;
            let list = [];
            let total = 0;
            for(let i=0; i < players.length; i++) {
                if(i === players.length - 1) {
                    list.push(budget - total);
                } else {
                    let share = Math.round((budget / players.length) * (0.6 + Math.random() * 0.8) / 1000) * 1000;
                    list.push(share);
                    total += share;
                }
            }
            list.sort(() => Math.random() - 0.5);
            db.ref('active_sessions/' + currentId).update({ status: 'playing', gameType: type, budgetList: list, showResults: (type === 'slot') });
        });
    }

    function initPart() {
        myName = document.getElementById('part-name').value.trim();
        currentId = document.getElementById('part-id').value.trim();
        if(!myName || !currentId) return alert("Lengkapi data");
        db.ref(`active_sessions/${currentId}/players/${myName}`).set(true);
        document.getElementById('name-tag').innerText = myName;
        listenData();
    }

    function listenData() {
        db.ref('active_sessions/' + currentId).on('value', snap => {
            session = snap.val();
            if(!session) return;
            const players = Object.keys(session.players || {});
            if(isHost) document.getElementById('player-count-host').innerText = players.length + " Peserta Tergabung";
            
            if(session.status === 'playing') {
                goTo('screen-game');
                renderUI();
            } else if(session.status === 'lobby' && !isHost) {
                document.getElementById('screen-game').style.display = 'none';
                document.getElementById('screen-start').style.display = 'block';
                alert("Game Selesai / Kembali ke Lobby");
            }
        });
    }

    function renderUI() {
        const area = document.getElementById('game-area');
        area.innerHTML = "";
        document.getElementById('title-game').innerText = session.gameType.toUpperCase();
        
        if(isHost) {
            document.getElementById('host-panel').style.display = 'block';
            area.innerHTML = "<p style='text-align:center; padding:20px; color:#aaa;'>Monitor Mode Active<br>Pantau tabel di bawah</p>";
            renderHostRecap();
        } else {
            document.getElementById('host-panel').style.display = 'none';
            if(session.gameType === 'pancing') renderFlying();
            else if(session.gameType === 'angka') renderGrid();
            else renderSlot();
        }
    }

    function renderFlying() {
        const area = document.getElementById('game-area');
        let myPick = null;
        if(session.selections) {
            Object.values(session.selections).forEach(s => { if(s.name === myName) myPick = s; });
        }
        if(myPick) {
            area.innerHTML = `<div style="text-align:center; padding-top:50px;"><h2 style="color:var(--gold);">DAPAT! 🧧</h2>
                             ${session.showResults ? `<h1>Rp${myPick.val.toLocaleString()}</h1>` : '<p>Tunggu dibuka Host...</p>'}</div>`;
            if(session.showResults) handleVoice(myPick.val);
            return;
        }
        session.budgetList.forEach((val, i) => {
            if(!session.selections || !session.selections[i]) {
                const a = document.createElement('div');
                a.className = "angpao-item";
                a.style.left = Math.random() * 80 + "%";
                a.style.animationDuration = (2 + Math.random() * 3) + "s";
                a.style.animationDelay = Math.random() * 3 + "s";
                a.onclick = () => securePick(i, val);
                area.appendChild(a);
            }
        });
    }

    function renderGrid() {
        const area = document.getElementById('game-area');
        area.innerHTML = '<div class="grid-game"></div>';
        const grid = area.querySelector('.grid-game');
        session.budgetList.forEach((val, i) => {
            const sel = session.selections ? session.selections[i] : null;
            const node = document.createElement('div');
            node.className = `game-node ${sel ? (sel.name === myName ? 'mine' : 'taken') : ''}`;
            if(session.showResults && sel && sel.name === myName) {
                node.innerText = `Rp${val.toLocaleString()}`; handleVoice(val);
            } else {
                node.innerText = sel ? (sel.name === myName ? "SAYA" : "OK") : i+1;
            }
            node.onclick = () => { if(!hasPicked && !sel) securePick(i, val); };
            grid.appendChild(node);
        });
    }

    function renderSlot() {
        const area = document.getElementById('game-area');
        let myWin = null;
        if(session.selections) Object.values(session.selections).forEach(s => { if(s.name === myName) myWin = s.val; });
        if(myWin) {
            area.innerHTML = `<div style="text-align:center; padding:50px;"><h1 style="color:var(--gold);">🎰 Rp${myWin.toLocaleString()}</h1></div>`;
            handleVoice(myWin);
        } else {
            area.innerHTML = `<div style="padding:20px;"><button class="btn btn-gold" onclick="spinSlot()">SPIN SEKARANG 🎰</button></div>`;
        }
    }

    function securePick(i, v) {
        db.ref(`active_sessions/${currentId}/selections/${i}`).transaction(curr => {
            if (curr === null) return { name: myName, val: v };
            return;
        }, (err, ok) => { if(ok) { hasPicked = true; confetti(); } });
    }

    function spinSlot() {
        db.ref(`active_sessions/${currentId}`).once('value', snap => {
            const data = snap.val();
            let taken = data.selections ? Object.keys(data.selections).map(Number) : [];
            let avail = data.budgetList.map((_, i) => i).filter(idx => !taken.includes(idx));
            if(avail.length === 0) return alert("Habis!");
            let target = avail[Math.floor(Math.random() * avail.length)];
            securePick(target, data.budgetList[target]);
        });
    }

    function renderHostRecap() {
        const body = document.getElementById('recap-body');
        body.innerHTML = "";
        const players = Object.keys(session.players || {});
        players.forEach(p => {
            let win = "<span style='color:#ccc'>Memilih...</span>";
            if(session.selections) {
                Object.values(session.selections).forEach(s => {
                    if(s.name === p) win = session.showResults ? `<b>Rp${s.val.toLocaleString()}</b>` : '<span style="color:green">✔ Terkunci</span>';
                });
            }
            body.innerHTML += `<tr><td>${p}</td><td>${win}</td></tr>`;
        });
    }

    function startScanner() {
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render((text) => { document.getElementById('part-id').value = text; scanner.clear(); });
    }

    function handleVoice(amt) {
        if(spoken) return;
        spoken = true;
        const msg = new SpeechSynthesisUtterance(`Selamat ${myName}, kamu dapat T H R sebesar ${amt} rupiah!`);
        msg.lang = 'id-ID'; window.speechSynthesis.speak(msg);
    }

    function revealAll() { db.ref(`active_sessions/${currentId}/showResults`).set(true); confetti(); }
    function resetRoom() { hasPicked = false; spoken = false; db.ref(`active_sessions/${currentId}`).update({ status: 'lobby', selections: null, showResults: false }); }
</script>
</body>
</html>
